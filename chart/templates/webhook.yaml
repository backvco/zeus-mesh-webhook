apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: zeus-mesh-webhook
  labels:
    app.kubernetes.io/name: zeus-mesh-webhook
    app.kubernetes.io/managed-by: zeus
  annotations:
    cert-manager.io/inject-ca-from: zeus-overlay/zeus-mesh-webhook-tls
webhooks:
  - name: mesh-ca.zeus.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Ignore
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods"]
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            {{- range .Values.excludedNamespaces }}
            - {{ . | quote }}
            {{- end }}
    clientConfig:
      service:
        name: zeus-mesh-webhook
        namespace: zeus-overlay
        path: /mutate
        port: 443
