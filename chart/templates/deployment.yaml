apiVersion: apps/v1
kind: Deployment
metadata:
  name: zeus-mesh-webhook
  namespace: zeus-overlay
  labels:
    app.kubernetes.io/name: zeus-mesh-webhook
    app.kubernetes.io/managed-by: zeus
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: zeus-mesh-webhook
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zeus-mesh-webhook
        app.kubernetes.io/managed-by: zeus
    spec:
      serviceAccountName: zeus-mesh-webhook
      containers:
        - name: webhook
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - -tls-cert=/tls/tls.crt
            - -tls-key=/tls/tls.key
            - -ca-configmap={{ .Values.caConfigMap }}
            - -ca-dir={{ .Values.caMountDir }}
          env:
            - name: EXCLUDED_NAMESPACES
              value: {{ join "," .Values.excludedNamespaces | quote }}
          ports:
            - name: https
              containerPort: 8443
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: tls
              mountPath: /tls
              readOnly: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: tls
          secret:
            secretName: zeus-mesh-webhook-tls
