name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Tidy
        run: go mod tidy && git diff --exit-code go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: Build (amd64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build ./cmd/webhook/

      - name: Build (arm64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build ./cmd/webhook/
